name: Build Gyroflow Toolbox for Final Cut Pro

on:
  workflow_dispatch:  # Запуск вручную из веб-интерфейса
  push:
    branches: [ main ]

jobs:
  build:
    name: Build on macOS
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Xcode command line tools (if needed)
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build the plugin
        run: |
          xcodebuild -project "Gyroflow Toolbox.xcodeproj" \
                     -scheme "Gyroflow Toolbox" \
                     -configuration Release \
                     -derivedDataPath ./DerivedData \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Locate .fcpxmp bundle
        run: |
          find ./DerivedData -name "*.fcpxmp" -type d

      - name: Package artifact
        run: |
          mkdir -p ./output
          cp -R "$(find ./DerivedData -name "Gyroflow Toolbox.fcpxmp" -type d | head -n1)" ./output/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gyroflow-Toolbox-fcpxmp
          path: ./output/Gyroflow\ Toolbox.fcpxmp
          retention-days: 7
